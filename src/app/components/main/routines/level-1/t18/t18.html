<div class="teacch-screen-wrapper">
  
  <div class="progress-container">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill"></div>
    </div>
    <span class="progress-text">8 / 10</span>
  </div>

  <main class="canvas-container">
    
    <div class="status-header">
      <h1 class="main-title">Momento de descansar</h1>
      <p class="status-subtitle">Relájate antes de continuar</p>
    </div>

    <div class="timer-visual-card">
      <div class="circle-svg-wrapper">
        <svg class="timer-svg" viewBox="0 0 220 220">
          <circle class="circle-bg" cx="110" cy="110" r="95"></circle>
          <circle class="circle-progress" cx="110" cy="110" r="95"
            [style.strokeDashoffset]="calcularStrokeOffset()">
          </circle>
        </svg>
        
        <div class="timer-text-overlay">
          <span class="time-counter-number">{{ tiempoRestante }}</span>
          <span class="time-unit-label">segundos</span>
        </div>
      </div>
    </div>

    @if (descansoFinalizado) {
      <div class="completion-banner">
        <span class="material-symbols-outlined check-banner-icon">verified</span>
        <p class="banner-text">¡Tiempo completado!</p>
      </div>
    }

  </main>
</div>

<nav class="action-navbar">
  <button class="nav-button-inactive" disabled>
    <span class="material-symbols-outlined">looks_one</span>
    <span class="nav-label">Primero</span>
  </button>

  <button class="btn-ready-action" 
    [disabled]="!descansoFinalizado"
    [ngClass]="{'btn-disabled-locked': !descansoFinalizado}"
    (click)="forzarAvanceManual()">
    <span class="material-symbols-outlined nav-check-icon">fast_forward</span>
    <span class="btn-ready-text">Luego</span>
  </button>

  <button class="nav-button-inactive" disabled>
    <span class="material-symbols-outlined">looks_two</span>
    <span class="nav-label">Después</span>
  </button>
</nav>
