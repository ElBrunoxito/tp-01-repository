<div class="teacch-screen-wrapper">
  
  <div class="progress-container">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill"></div>
    </div>
    <span class="progress-text">6 / 10</span>
  </div>

  <main class="canvas-container">
    
    <div class="instruction-header">
      <h1 class="main-title">¿Qué falta?</h1>
      
      @if (mensajeFeedback) {
        <p class="feedback-message" [ngClass]="{'error-text': mensajeFeedback === 'Intenta otra vez', 'success-text': mensajeFeedback === '¡Bien! ⭐'}">
          {{ mensajeFeedback }}
        </p>
      }
    </div>

    <div class="exercise-card">
      <div class="pattern-row">
        <div class="shape circle-red"></div>
        <div class="shape square-blue"></div>
        <div class="shape circle-red"></div>
        
        <div class="target-slot" [ngClass]="{'slot-filled': opcionSeleccionadaId !== null}">
          @if (opcionSeleccionadaId === 'cuadrado_azul' || mostrarSolucionAsistida) {
            <div class="shape-inner square-blue-inner"></div>
          } @else {
            <span class="material-symbols-outlined help-icon">help</span>
          }
        </div>
      </div>

      <div class="visual-support-box">
        <div class="support-flex">
          <span class="material-symbols-outlined support-icon icon-red">circle</span>
          <span class="material-symbols-outlined support-icon icon-blue">square</span>
          <span class="material-symbols-outlined support-icon icon-red">circle</span>
          <span class="material-symbols-outlined support-icon icon-disabled">help</span>
        </div>
      </div>
    </div>

    <div class="options-grid">
      @for (opcion of opcionesRespuesta; track opcion.id) {
        <button 
          (click)="evaluarRespuesta(opcion.id)"
          [disabled]="bloquearInteraccion"
          class="option-button"
          [ngClass]="{
            'option-selected': opcionSeleccionadaId === opcion.id,
            'force-highlight': activarPistaVisual && opcion.esCorrecta
          }">
          
          @if (opcion.forma === 'rombo') {
            <div class="shape-item item-rhombus"></div>
          }
          @if (opcion.forma === 'cuadrado') {
            <div class="shape-item item-square"></div>
          }
          @if (opcion.forma === 'circulo_rojo') {
            <div class="shape-item item-circle-red"></div>
          }
          @if (opcion.forma === 'circulo_verde') {
            <div class="shape-item item-circle-green"></div>
          }
        </button>
      }
    </div>

  </main>
</div>

<nav class="action-navbar">
  <button class="nav-button-inactive" disabled>
    <span class="material-symbols-outlined">assignment</span>
    <span class="nav-label">Tareas</span>
  </button>

  <button class="btn-ready-action" (click)="presionarBotonListo()">
    <span class="material-symbols-outlined nav-check-icon">check_circle</span>
    <span class="btn-ready-text">Listo</span>
  </button>

  <button class="nav-button-inactive" disabled>
    <span class="material-symbols-outlined">settings</span>
    <span class="nav-label">Ajustes</span>
  </button>
</nav>
