<div class="profile-container">
  <main class="profile-content">
    <h2>Mi Perfil</h2>
    <p class="subtitle">Gestiona tu información personal</p>

    @if(profileForm){

    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-card">
      
      <div class="avatar-section">
        <div class="avatar-wrapper">
          <img src="https://static.vecteezy.com/system/resources/thumbnails/017/800/528/small/user-simple-flat-icon-illustration-vector.jpg" alt="Foto de perfil" class="avatar-img">
        </div>
      </div>

      <div class="form-group">
        <label for="name">Nombre Completo</label>
        <input type="text" id="name" formControlName="name" placeholder="Tu nombre">
      </div>

      <div class="form-group">
        <label for="username">Correo Electrónico</label>
        <input type="email" id="username" formControlName="username" placeholder="alejandro.martinez@teacch.help">
      </div>

      <div class="form-group">
        <label for="work">A qué se dedica</label>
        <input type="text" id="work" formControlName="work" placeholder="Ej. Educador, Psicólogo, Padre">
      </div>

      <fieldset class="sub-section">
        <legend>Información del Niño</legend>
        
        <div class="row">
          <div class="form-group col-8">
            <label for="nameChild">Nombre del Niño</label>
            <input type="text" id="nameChild" formControlName="nameChild" placeholder="Nombre del menor">
          </div>
          <div class="form-group col-4">
            <label for="ageChild">Edad</label>
            <input type="number" id="ageChild" formControlName="ageChild" placeholder="Años">
          </div>
        </div>

        <div class="row">
          <div class="form-group col-6">
            <label for="genderChild">Sexo</label>
            <div class="select-wrapper">
              <select id="genderChild" formControlName="genderChild">
                <option value="" disabled selected>Seleccionar...</option>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro</option>
              </select>
            </div>
          </div>
          <div class="form-group col-6">
            <label for="levelTEA">Nivel detectado de TEA</label>
            <div class="select-wrapper">
              <select id="levelTEA" formControlName="levelTEA">
                <option value="" disabled selected>Seleccionar nivel...</option>
                <option value="1">Nivel 1</option>
                <option value="2">Nivel 2</option>
                <option value="3">Nivel 3</option>
              </select>
            </div>
          </div>
        </div>
      </fieldset>

      <fieldset class="sub-section no-border">
        <legend>Seguridad</legend>
        
        <div class="row">
          <div class="form-group col-6">
            <label for="currentPassword">Contraseña Actual</label>
            <input type="password" id="currentPassword" formControlName="currentPassword" placeholder="********">
          </div>
          <div class="form-group col-6">
            <label for="password">Nueva Contraseña</label>
            <input type="password" id="password" formControlName="password" placeholder="Mínimo 8 caracteres">
          </div>
        </div>
      </fieldset>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid">Guardar Cambios</button>
      </div>

    </form>
    }

  </main>

  <footer class="profile-footer">
    © 2026 HelpWithTEACCH. Todos los derechos reservados.
  </footer>
</div>
